<!DOCTYPE html>
<html>
<head>
    <title>Capital Gains Calculator</title>
</head>
<body>

<h2>Capital Gains Calculator</h2>

<form action="/calculate" method="POST">
    <label>Company:</label><br>
    <input type="text" name="company" required><br><br>

    <label>Quantity:</label><br>
    <input type="number" name="quantity" required><br><br>

    <label>Buy Price (per share):</label><br>
    <input type="number" step="0.01" name="buy_price" required><br><br>

    <label>Sell Price (per share):</label><br>
    <input type="number" step="0.01" name="sell_price" required><br><br>

    <button type="submit">Calculate</button>
</form>

</body>
</html>
